<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Kwakcamole.archive — notes</title>

  <!-- 기존 사이트 공통 스타일 -->
  <link
    rel="stylesheet"
    href="style.css?v=notes-blog-list-1"
  >

  <!-- NOTES 페이지 전용 스타일 -->
  <style>
    /* =========================================
       NOTES LIST PAGE ONLY
       다른 페이지에는 영향을 주지 않음
    ========================================= */

    body.page-notes {
      margin: 0;
      padding: 0;

      background: #ffffff;
      color: #111111;
    }


    body.page-notes * {
      box-sizing: border-box;
    }


    /* =========================================
       NOTES 전체 영역
    ========================================= */

    body.page-notes .notes-wrap {
      width: calc(100% - 64px);
      max-width: 980px;

      margin: 0 auto;
      padding: 145px 0 130px;

      font-family: "Paperlogy", sans-serif;
    }


    /* =========================================
       PAGE INTRO
    ========================================= */

    body.page-notes .notes-intro {
      display: grid;

      grid-template-columns:
        minmax(0, 1fr)
        minmax(280px, 380px);

      align-items: end;
      column-gap: 50px;

      margin-bottom: 42px;
      padding-bottom: 28px;

      border-bottom: 1px solid #eeeeee;
    }


    body.page-notes .notes-label {
      margin: 0 0 9px;

      color: #ef94bd;

      font-family: "Paperlogy", sans-serif;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.08em;

      text-transform: lowercase;
    }


    body.page-notes .notes-title {
      margin: 0;

      font-family: "Paperlogy", sans-serif;
      font-size: 44px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.045em;

      word-break: keep-all;
    }


    body.page-notes .notes-description {
      max-width: 380px;

      margin: 0;
      padding-bottom: 2px;

      color: #555555;

      font-family: "Paperlogy", sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.8;

      word-break: keep-all;
    }


    /* =========================================
       NOTE LIST
    ========================================= */

    body.page-notes .note-list {
      display: flex;
      flex-direction: column;

      width: 100%;
    }


    body.page-notes .note-card {
      width: 100%;

      margin: 0;
      padding: 0;

      border-bottom: 1px solid #eeeeee;
    }


    /* 카드 전체 클릭 */

    body.page-notes .note-link {
      display: grid;

      grid-template-columns:
        280px
        minmax(0, 1fr);

      align-items: center;
      column-gap: 36px;

      width: 100%;

      padding: 30px 0;

      color: inherit;
      text-decoration: none;
    }


    /* =========================================
       NOTE THUMBNAIL
    ========================================= */

    body.page-notes .note-thumbnail {
      width: 280px;
      overflow: hidden;

      border-radius: 12px;
    }


    body.page-notes .note-image {
      display: block;

      width: 100%;
      height: auto;

      aspect-ratio: 4 / 3;
      object-fit: cover;

      transition:
        transform 0.28s ease,
        opacity 0.28s ease;
    }


    /* =========================================
       NOTE CONTENT
    ========================================= */

    body.page-notes .note-content {
      min-width: 0;
    }


    body.page-notes .note-meta {
      display: flex;
      align-items: center;

      gap: 12px;

      margin-bottom: 13px;

      color: #999999;

      font-family: "Paperlogy", sans-serif;
      font-size: 10px;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: 0.04em;
    }


    body.page-notes .note-number {
      color: #ef94bd;
      font-weight: 700;
    }


    body.page-notes .note-title {
      margin: 0 0 13px;

      font-family: "Paperlogy", sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.025em;

      word-break: keep-all;

      transition: color 0.2s ease;
    }


    body.page-notes .note-excerpt {
      max-width: 520px;

      margin: 0 0 18px;

      color: #666666;

      font-family: "Paperlogy", sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.8;

      word-break: keep-all;
    }


    body.page-notes .note-read {
      display: inline-block;

      color: #d97eaa;

      font-family: "Paperlogy", sans-serif;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.03em;
    }


    /* =========================================
       HOVER
    ========================================= */

    @media (hover: hover) {

      body.page-notes .note-link:hover
      .note-image {
        transform: scale(1.025);
        opacity: 0.94;
      }


      body.page-notes .note-link:hover
      .note-title {
        color: #d97eaa;
      }

    }


    body.page-notes .note-link:focus-visible {
      outline: 1px dashed #ef94bd;
      outline-offset: 8px;
    }


    /* =========================================
       MOBILE
    ========================================= */

    @media screen and (max-width: 760px) {

      body.page-notes .notes-wrap {
        width: calc(100% - 32px);

        padding: 105px 0 80px;
      }


      body.page-notes .notes-intro {
        grid-template-columns: 1fr;

        row-gap: 22px;

        margin-bottom: 25px;
        padding-bottom: 24px;
      }


      body.page-notes .notes-title {
        font-size: 36px;
      }


      body.page-notes .notes-description {
        max-width: 100%;

        font-size: 12px;
      }


      body.page-notes .note-link {
        grid-template-columns: 1fr;

        row-gap: 20px;

        padding: 25px 0 34px;
      }


      body.page-notes .note-thumbnail {
        width: 100%;
        max-width: 420px;
      }


      body.page-notes .note-title {
        font-size: 20px;
      }


      body.page-notes .note-excerpt {
        font-size: 12px;
      }

    }


    @media screen and (max-width: 420px) {

      body.page-notes .notes-title {
        font-size: 32px;
      }


      body.page-notes .note-title {
        font-size: 19px;
      }

    }
  </style>
</head>


<body class="page-notes">

  <!-- =========================================
       TOP FIXED HEADER
       기존 사이트와 동일
  ========================================== -->

  <header class="top">

    <div
      class="top-left"
      id="favHeart"
    >
      fav ♥
    </div>


    <a
      class="top-title"
      href="index.html"
    >
      Kwakcamole.archive
    </a>


    <a
      class="top-right"
      href="index.html"
      aria-label="home"
    >
      <img
        src="images/집.png"
        alt="home icon"
      >
    </a>

  </header>


  <!-- =========================================
       NOTES PAGE
  ========================================== -->

  <main class="notes-wrap">

    <!-- PAGE TITLE -->

    <section class="notes-intro">

      <div>

        <p class="notes-label">
          research archive
        </p>

        <h1 class="notes-title">
          Soft Notes
        </h1>

      </div>


      <p class="notes-description">
        작업이 완성되기 전의 생각과 이미지,
        소재 실험과 실패의 흔적을 천천히 기록합니다.
        완성된 결과보다 그 사이에서 발견한 감각을 모으는 공간입니다.
      </p>

    </section>


    <!-- =========================================
         NOTE LIST
    ========================================== -->

    <section class="note-list">


      <!-- =====================================
           NOTE 001
           카드 전체를 누르면 note-001.html로 이동
      ====================================== -->

      <article class="note-card">

        <a
          class="note-link"
          href="note-001.html"
          aria-label="Textile Pieces Process Note 읽기"
        >

          <!-- THUMBNAIL -->

          <div class="note-thumbnail">

            <img
              class="note-image"
              src="images/textile-pieces.png"
              alt="Textile Pieces research process"
            >

          </div>


          <!-- NOTE INFORMATION -->

          <div class="note-content">

            <div class="note-meta">

              <span class="note-number">
                No. 001
              </span>

              <time datetime="2026-07-22">
                22 July 2026
              </time>

            </div>


            <h2 class="note-title">
              Textile Pieces — Process Note
            </h2>


            <p class="note-excerpt">
              작은 패브릭 조각과 서로 다른 질감이
              한 화면 안에서 만드는 관계를 관찰한 기록입니다.
              현재 연구일지를 정리하고 있습니다.
            </p>


            <span class="note-read">
              Read note →
            </span>

          </div>

        </a>

      </article>


      <!-- =====================================
           새로운 연구일지는
           article.note-card 전체를 복사하여
           이 아래에 붙여넣기
      ====================================== -->


    </section>

  </main>


  <!-- 기존 사이트 JavaScript -->

  <script src="script.js?v=20260722-notes-blog-list-1"></script>

</body>

</html>
