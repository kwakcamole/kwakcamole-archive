<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Soft Notes — Kwakcamole.archive</title>

  <!-- 기존 사이트 공통 스타일 -->
  <link
    rel="stylesheet"
    href="/style.css?v=20260722-note-detail-8"
  >

  <style>
    /* =========================================
       SOFT NOTES — DETAIL PAGE
       note.html 전용
    ========================================= */

    body.page-note-detail {
      margin: 0;
      padding: 0;

      background: #ffffff;
      color: #111111;
    }


    body.page-note-detail * {
      box-sizing: border-box;
    }


    /* =========================================
       전체 영역
    ========================================= */

    body.page-note-detail .note-detail-wrap {
      width: calc(100% - 64px);
      max-width: 820px;

      margin: 0 auto;
      padding: 145px 0 140px;
    }


    /*
      상단 로고는 기존 MiniPizza 유지
      본문은 Contact와 같은 Paperlogy
    */

    body.page-note-detail .note-detail-wrap,
    body.page-note-detail .note-detail-wrap * {
      font-family: "Paperlogy", sans-serif;
    }


    /* =========================================
       목록으로 돌아가기
    ========================================= */

    body.page-note-detail .back-to-notes {
      display: inline-block;

      margin-bottom: 46px;

      color: #999999;

      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: 0;

      text-decoration: none;

      transition: color 0.2s ease;
    }


    body.page-note-detail .back-to-notes:hover {
      color: #d97eaa;
    }


    /* =========================================
       상세페이지 상단
    ========================================= */

    body.page-note-detail .note-detail-meta {
      display: flex;
      align-items: center;
      gap: 13px;

      margin-bottom: 15px;

      color: #999999;

      font-size: 11px;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: 0.02em;
    }


    body.page-note-detail .note-detail-number {
      color: #ef94bd;
      font-weight: 700;
    }


    body.page-note-detail .note-detail-title {
      margin: 0 0 24px;

      font-size: 36px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.04em;

      word-break: keep-all;
    }


    body.page-note-detail .note-detail-intro {
      max-width: 650px;

      margin: 0 0 44px;

      color: #555555;

      font-size: 15px;
      font-weight: 400;
      line-height: 1.9;
      letter-spacing: -0.025em;

      word-break: keep-all;
    }


    /* =========================================
       메인 이미지
    ========================================= */

    body.page-note-detail .note-figure {
      margin: 0 0 48px;
    }


    body.page-note-detail .note-main-image {
      display: block;

      width: 100%;
      max-width: 720px;
      height: auto;

      margin: 0 auto;

      border-radius: 14px;
    }


    body.page-note-detail .note-image-caption {
      width: 100%;
      max-width: 720px;

      margin: 10px auto 0;

      color: #999999;

      font-size: 10px;
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0.01em;
    }


    /* =========================================
       본문
    ========================================= */

    body.page-note-detail .note-body {
      width: 100%;
      max-width: 650px;

      margin: 0 auto;
    }


    body.page-note-detail .note-body p {
      margin: 0 0 24px;

      color: #444444;

      font-size: 15px;
      font-weight: 400;
      line-height: 2;
      letter-spacing: -0.025em;

      word-break: keep-all;
    }


    body.page-note-detail .note-body h2 {
      margin: 52px 0 18px;

      color: #111111;

      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: -0.02em;

      word-break: keep-all;
    }


    body.page-note-detail .note-body img {
      display: block;

      width: 100%;
      height: auto;

      margin: 34px auto;

      border-radius: 12px;
    }


    /* =========================================
       태그
    ========================================= */

    body.page-note-detail .note-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;

      width: 100%;
      max-width: 650px;

      margin: 48px auto 0;
      padding-top: 28px;

      border-top: 1px solid #eeeeee;
    }


    body.page-note-detail .note-tag {
      display: inline-flex;
      align-items: center;

      min-height: 28px;

      padding: 6px 11px;

      border: 1px solid #f4bad4;
      border-radius: 999px;

      background: #fff7fb;
      color: #d97eaa;

      font-size: 10px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.02em;
    }


    /* =========================================
       오류 메시지
    ========================================= */

    body.page-note-detail .note-message {
      padding: 70px 0;

      color: #777777;

      font-size: 14px;
      line-height: 1.8;

      text-align: center;
      word-break: keep-all;
    }


    /* =========================================
       모바일
    ========================================= */

    @media screen and (max-width: 760px) {

      body.page-note-detail .note-detail-wrap {
        width: calc(100% - 32px);

        padding: 105px 0 85px;
      }


      body.page-note-detail .back-to-notes {
        margin-bottom: 34px;
      }


      body.page-note-detail .note-detail-title {
        font-size: 28px;
      }


      body.page-note-detail .note-detail-intro {
        margin-bottom: 32px;

        font-size: 14px;
      }


      body.page-note-detail .note-main-image {
        border-radius: 11px;
      }


      body.page-note-detail .note-figure {
        margin-bottom: 36px;
      }


      body.page-note-detail .note-body p {
        font-size: 14px;
        line-height: 1.9;
      }


      body.page-note-detail .note-body h2 {
        margin-top: 42px;

        font-size: 18px;
      }

    }
  </style>
</head>


<body class="page-note-detail">

  <!-- =========================================
       기존 사이트 헤더
  ========================================== -->

  <header class="top">

    <div
      class="top-left"
      id="favHeart"
    >
      fav ♥
    </div>


    <a
      class="top-title"
      href="/"
    >
      Kwakcamole.archive
    </a>


   <a
  class="top-right"
  href="https://www.instagram.com/kwakcamole.archive/"
  target="_blank"
  rel="noopener noreferrer"
  aria-label="Kwakcamole archive Instagram"
>
  <img
    src="/images/집.png"
    alt="Instagram"
  >
</a>

  </header>


  <!-- =========================================
       NOTE DETAIL PAGE
  ========================================== -->

  <main class="note-detail-wrap">

    <!-- 목록으로 돌아가기 -->

    <a
      class="back-to-notes"
      href="/notes"
    >
      ← Soft Notes
    </a>


    <!-- 선택된 글이 자동으로 들어오는 영역 -->

    <article id="noteArticle">

      <p class="note-message">
        연구일지를 불러오는 중입니다.
      </p>

    </article>

  </main>


  <!-- =========================================
       연구일지 데이터
  ========================================== -->

  <script src="/notes-data.js?v=20260722-note-detail-8"></script>


  <!-- =========================================
       선택한 글 자동 표시
  ========================================== -->

  <script>
    document.addEventListener(
      "DOMContentLoaded",
      function () {

        const params =
          new URLSearchParams(
            window.location.search
          );


        const requestedId =
          params.get("id") || "001";


        const notes =
          Array.isArray(window.notesData)
            ? window.notesData
            : [];


        const noteArticle =
          document.getElementById(
            "noteArticle"
          );


        function getAssetPath(path) {

          if (!path) {
            return "";
          }


          if (
            path.startsWith("/") ||
            path.startsWith("http://") ||
            path.startsWith("https://")
          ) {
            return path;
          }


          return "/" + path;
        }


        const selectedNote =
          notes.find(function (note) {

            return (
              String(note.id) ===
              String(requestedId)
            );

          });


        if (!selectedNote) {

          noteArticle.innerHTML = `
            <div class="note-message">

              해당 연구일지를 찾을 수 없습니다.<br>

              <a href="/notes">
                Soft Notes 목록으로 돌아가기
              </a>

            </div>
          `;

          return;
        }


        /*
          브라우저 탭 제목 변경
        */

        document.title =
          selectedNote.title +
          " — Soft Notes";


        const imagePath =
          getAssetPath(
            selectedNote.image
          );


        const tags =
          Array.isArray(selectedNote.tags)
            ? selectedNote.tags
            : [];


        const tagsHTML =
          tags
            .map(function (tag) {

              return `
                <span class="note-tag">
                  ${tag}
                </span>
              `;

            })
            .join("");


        const figureHTML =
          imagePath
            ? `
              <figure class="note-figure">

                <img
                  class="note-main-image"
                  src="${imagePath}"
                  alt="${selectedNote.imageAlt || selectedNote.title}"
                >

                <figcaption class="note-image-caption">
                  ${selectedNote.caption || ""}
                </figcaption>

              </figure>
            `
            : "";


        noteArticle.innerHTML = `

          <div class="note-detail-meta">

            <span class="note-detail-number">
              No. ${selectedNote.id}
            </span>

            <time datetime="${selectedNote.datetime}">
              ${selectedNote.date}
            </time>

          </div>


          <h1 class="note-detail-title">
            ${selectedNote.title}
          </h1>


          <p class="note-detail-intro">
            ${selectedNote.intro || ""}
          </p>


          ${figureHTML}


          <div class="note-body">
            ${selectedNote.content || ""}
          </div>


          <div class="note-tags">
            ${tagsHTML}
          </div>
        `;

      }
    );
  </script>

</body>

</html>
