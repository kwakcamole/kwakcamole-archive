<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Kwakcamole.archive — notes</title>

  <!-- 기존 사이트 공통 스타일 -->
  <link
    rel="stylesheet"
    href="style.css?v=notes-paperlogy-final-2"
  >

  <style>
    /* =========================================
       NOTES LIST PAGE ONLY
       다른 페이지에는 영향을 주지 않음
    ========================================= */

    body.page-notes {
      margin: 0;
      padding: 0;

      background: #ffffff;
      color: #111111;
    }


    body.page-notes * {
      box-sizing: border-box;
    }


    /* =========================================
       NOTES 전체 영역
    ========================================= */

    body.page-notes .notes-wrap {
      width: calc(100% - 64px);
      max-width: 980px;

      margin: 0 auto;
      padding: 145px 0 130px;

      font-family: "Paperlogy", sans-serif;
    }


    /*
      헤더의 MiniPizza 폰트는 유지하고,
      연구일지 영역에만 Paperlogy를 강제 적용
    */

    body.page-notes .notes-wrap,
    body.page-notes .notes-wrap * {
      font-family: "Paperlogy", sans-serif !important;
    }


    /* =========================================
       PAGE INTRO
    ========================================= */

    body.page-notes .notes-intro {
      display: grid;

      grid-template-columns:
        minmax(0, 1fr)
        minmax(280px, 380px);

      align-items: end;
      column-gap: 50px;

      margin-bottom: 42px;
      padding-bottom: 28px;

      border-bottom: 1px solid #eeeeee;
    }


    body.page-notes .notes-label {
      margin: 0 0 9px;

      color: #ef94bd;

      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.08em;

      text-transform: lowercase;
    }


    body.page-notes .notes-title {
      margin: 0;

      font-size: 44px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.045em;

      word-break: keep-all;
    }


    body.page-notes .notes-description {
      max-width: 380px;

      margin: 0;
      padding-bottom: 2px;

      color: #555555;

      font-size: 13px;
      font-weight: 400;
      line-height: 1.85;
      letter-spacing: -0.025em;

      word-break: keep-all;
    }


    /* =========================================
       NOTE LIST
    ========================================= */

    body.page-notes .note-list {
      display: flex;
      flex-direction: column;

      width: 100%;
    }


    body.page-notes .note-card {
      width: 100%;

      margin: 0;
      padding: 0;

      border-bottom: 1px solid #eeeeee;
    }


    /* 카드 전체 클릭 */

    body.page-notes .note-link {
      display: grid;

      grid-template-columns:
        280px
        minmax(0, 1fr);

      align-items: center;
      column-gap: 36px;

      width: 100%;

      padding: 30px 0;

      color: inherit;
      text-decoration: none;
    }


    /* =========================================
       NOTE THUMBNAIL
    ========================================= */

    body.page-notes .note-thumbnail {
      width: 280px;
      overflow: hidden;

      border-radius: 12px;
    }


    body.page-notes .note-image {
      display: block;

      width: 100%;
      height: auto;

      aspect-ratio: 4 / 3;
      object-fit: cover;

      transition:
        transform 0.28s ease,
        opacity 0.28s ease;
    }


    /* =========================================
       NOTE CONTENT
    ========================================= */

    body.page-notes .note-content {
      min-width: 0;
    }


    body.page-notes .note-meta {
      display: flex;
      align-items: center;
      gap: 12px;

      margin-bottom: 13px;

      color: #999999;

      font-size: 10px;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: 0.04em;
    }


    body.page-notes .note-number {
      color: #ef94bd;
      font-weight: 700;
    }


    body.page-notes .note-title {
      margin: 0 0 13px;

      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.035em;

      word-break: keep-all;

      transition: color 0.2s ease;
    }


    body.page-notes .note-excerpt {
      max-width: 520px;

      margin: 0 0 18px;

      color: #666666;

      font-size: 13px;
      font-weight: 400;
      line-height: 1.9;
      letter-spacing: -0.025em;

      word-break: keep-all;
    }


    body.page-notes .note-read {
      display: inline-block;

      color: #d97eaa;

      font-size: 10px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.03em;
    }


    /* =========================================
       HOVER
    ========================================= */

    @media (hover: hover) {

      body.page-notes .note-link:hover
      .note-image {
        transform: scale(1.025);
        opacity: 0.94;
      }


      body.page-notes .note-link:hover
      .note-title {
        color: #d97eaa;
      }

    }


    body.page-notes .note-link:focus-visible {
      outline: 1px dashed #ef94bd;
      outline-offset: 8px;
    }


    /* =========================================
       목록이 없을 때
    ========================================= */

    body.page-notes .notes-empty {
      padding: 60px 0;

      color: #999999;

      font-size: 13px;
      font-weight: 400;
      line-height: 1.8;
      letter-spacing: -0.02em;

      text-align: center;
      word-break: keep-all;
    }


    /* =========================================
       MOBILE
    ========================================= */

    @media screen and (max-width: 760px) {

      body.page-notes .notes-wrap {
        width: calc(100% - 32px);

        padding: 105px 0 80px;
      }


      body.page-notes .notes-intro {
        grid-template-columns: 1fr;

        row-gap: 22px;

        margin-bottom: 25px;
        padding-bottom: 24px;
      }


      body.page-notes .notes-title {
        font-size: 36px;
      }


      body.page-notes .notes-description {
        max-width: 100%;

        font-size: 12px;
      }


      body.page-notes .note-link {
        grid-template-columns: 1fr;

        row-gap: 20px;

        padding: 25px 0 34px;
      }


      body.page-notes .note-thumbnail {
        width: 100%;
        max-width: 420px;
      }


      body.page-notes .note-title {
        font-size: 20px;
      }


      body.page-notes .note-excerpt {
        font-size: 12px;
      }

    }


    @media screen and (max-width: 420px) {

      body.page-notes .notes-title {
        font-size: 32px;
      }


      body.page-notes .note-title {
        font-size: 19px;
      }

    }
  </style>
</head>


<body class="page-notes">

  <!-- =========================================
       기존 사이트 헤더
  ========================================== -->

  <header class="top">

    <div
      class="top-left"
      id="favHeart"
    >
      fav ♥
    </div>


    <a
      class="top-title"
      href="index.html"
    >
      Kwakcamole.archive
    </a>


    <a
      class="top-right"
      href="index.html"
      aria-label="home"
    >
      <img
        src="images/집.png"
        alt="home icon"
      >
    </a>

  </header>


  <!-- =========================================
       NOTES PAGE
  ========================================== -->

  <main class="notes-wrap">

    <!-- 페이지 소개 -->

    <section class="notes-intro">

      <div>

        <p class="notes-label">
          research archive
        </p>

        <h1 class="notes-title">
          Soft Notes
        </h1>

      </div>


      <p class="notes-description">
        작업이 완성되기 전의 생각과 이미지,
        소재 실험과 실패의 흔적을 천천히 기록합니다.
        완성된 결과보다 그 사이에서 발견한 감각을 모으는 공간입니다.
      </p>

    </section>


    <!-- 연구일지가 자동으로 생성되는 영역 -->

    <section
      class="note-list"
      id="noteList"
    ></section>

  </main>


  <!-- =========================================
       연구일지 데이터
  ========================================== -->

  <script src="notes-data.js?v=20260722-paperlogy-2"></script>


  <!-- =========================================
       목록 자동 생성
  ========================================== -->

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const noteList =
        document.getElementById("noteList");


      const notes =
        Array.isArray(window.notesData)
          ? [...window.notesData]
          : [];


      if (notes.length === 0) {

        noteList.innerHTML = `
          <p class="notes-empty">
            아직 작성된 연구일지가 없습니다.
          </p>
        `;

        return;
      }


      /*
        최신 날짜의 연구일지가
        위쪽에 표시되도록 정렬
      */

      notes.sort(function (a, b) {

        return new Date(b.datetime) -
          new Date(a.datetime);

      });


      noteList.innerHTML =
        notes
          .map(function (note) {

            return `
              <article class="note-card">

                <a
                  class="note-link"
                  href="note.html?id=${note.id}"
                  aria-label="${note.title} 읽기"
                >

                  <div class="note-thumbnail">

                    <img
                      class="note-image"
                      src="${note.image}"
                      alt="${note.imageAlt || note.title}"
                    >

                  </div>


                  <div class="note-content">

                    <div class="note-meta">

                      <span class="note-number">
                        No. ${note.id}
                      </span>

                      <time datetime="${note.datetime}">
                        ${note.date}
                      </time>

                    </div>


                    <h2 class="note-title">
                      ${note.title}
                    </h2>


                    <p class="note-excerpt">
                      ${note.excerpt}
                    </p>


                    <span class="note-read">
                      Read note →
                    </span>

                  </div>

                </a>

              </article>
            `;

          })
          .join("");

    });
  </script>


  <!-- 기존 사이트 JavaScript -->

  <script src="script.js?v=20260722-notes-paperlogy-final-2"></script>

</body>

</html>
