<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Kwakcamole.archive</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <meta
    http-equiv="Cache-Control"
    content="no-cache, no-store, must-revalidate"
  >

  <meta
    http-equiv="Pragma"
    content="no-cache"
  >

  <meta
    http-equiv="Expires"
    content="0"
  >
</head>


<body class="page-home">

  <!-- TOP FIXED HEADER -->

  <header class="top">

    <div
      class="top-left"
      id="favHeart"
    >
      fav ♥
    </div>


    <a
      class="top-title"
      href="index.html"
    >
      Kwakcamole.archive
    </a>


    <a
      class="top-right"
      href="https://www.instagram.com/kwakcamole.archive/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Instagram"
    >
      <img
        src="images/집.png"
        alt="Instagram"
      >
    </a>

  </header>


  <!-- HOME CANVAS -->

  <main
    id="home"
    class="stage"
  >

    <!-- FOLDER CLUSTER -->

    <nav
      class="folder-cluster"
      aria-label="Main navigation"
    >

      <!-- ABOUT -->

      <a
        class="folder-item p1"
        href="about.html"
      >
        <img
          class="folder-img"
          src="images/folder.png"
          alt="about folder"
        >

        <div class="folder-name">
          about
        </div>
      </a>


      <!-- WORKS -->

      <a
        class="folder-item p2"
        href="works.html"
      >
        <img
          class="folder-img"
          src="images/folder.png"
          alt="works folder"
        >

        <div class="folder-name">
          works
        </div>
      </a>


      <!-- CONTACTS -->

      <a
        class="folder-item p3"
        href="contacts.html"
      >
        <img
          class="folder-img"
          src="images/folder.png"
          alt="contacts folder"
        >

        <div class="folder-name">
          contacts
        </div>
      </a>


      <!-- DECORATIVE FOLDER -->

      <div class="folder-item ghost p4">

        <img
          class="folder-img"
          src="images/folder.png"
          alt=""
        >

        <div class="folder-name">
          .
        </div>

      </div>


      <!-- DECORATIVE FOLDER -->

      <div class="folder-item ghost p5">

        <img
          class="folder-img"
          src="images/folder.png"
          alt=""
        >

        <div class="folder-name">
          .
        </div>

      </div>


      <!-- NOTES -->

      <a
        class="folder-item p6"
        href="notes.html"
      >
        <img
          class="folder-img"
          src="images/folder.png"
          alt="notes folder"
        >

        <div class="folder-name">
          notes
        </div>
      </a>


      <!-- DECORATIVE FOLDER -->

      <div class="folder-item ghost p7">

        <img
          class="folder-img"
          src="images/folder.png"
          alt=""
        >

        <div class="folder-name">
          .
        </div>

      </div>


      <!-- DECORATIVE FOLDER -->

      <div class="folder-item ghost p8">

        <img
          class="folder-img"
          src="images/folder.png"
          alt=""
        >

        <div class="folder-name">
          .
        </div>

      </div>

    </nav>


    <!-- INTRO TEXT -->

    <section class="intro">

      <p>
        An archive where softness accumulates and lingers,<br>
        through objects and everyday forms.
      </p>

    </section>


    <!-- SPEECH BUBBLE + CHARACTER -->

    <section class="mascot-area">

      <div class="bubble">
        Welcome ♥ This is my place !
      </div>

      <img
        class="me"
        src="images/me.png"
        alt="Kwakcamole character"
      >

    </section>


    <div
      id="contact"
      class="contact-hidden"
    ></div>

  </main>


  <script src="script.js"></script>

</body>

</html>
